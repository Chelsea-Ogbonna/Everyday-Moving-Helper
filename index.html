<!DOCTYPE html>
<html>
<head>
  <title>Everyday Moving Helper</title>
</head>

<body>
  <h1>Everyday Moving Helper</h1>

  <h2>Robot Code CSV Data</h2>

  <button onclick="loadCSV()">Load Data</button>

  <pre id="output">Click the button to load data...</pre>

  <script>
    async function loadCSV() {
      try {
        // CHANGE THIS LINE IF YOUR FILE NAME IS DIFFERENT
        const filePath = "robotcode/data.csv";

        const response = await fetch(filePath);

        if (!response.ok) {
          throw new Error("File not found. Check path: " + filePath);
        }

        const text = await response.text();

        document.getElementById("output").innerText = text;
      } catch (error) {
        document.getElementById("output").innerText =
          "Error loading file: " + error.message;
      }
    }
  </script>

</body>
</html>
